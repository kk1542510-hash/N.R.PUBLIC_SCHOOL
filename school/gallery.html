<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>N.R. Public School | Saharanpur</title>

    <link rel="icon" type="image/png" href="https://scontent.fdel27-5.fna.fbcdn.net/v/t39.30808-6/301379224_462731822531471_8509956549566154454_n.png?_nc_cat=103&ccb=1-7&_nc_sid=1d70fc&_nc_ohc=GPngXmnjXMEQ7kNvwFHeAaF&_nc_oc=AdqDk_Av5MzryoLudco6eBygFRCt1aVYDtPeAnU7BWigek2Kvb5gzpLrNWZIZ4K9uUWZGZn2_z3y2Wyg7ZnwVnqr&_nc_zt=23&_nc_ht=scontent.fdel27-5.fna&_nc_gid=9c0iHFpPRP-xZDrW2DaNpg&_nc_ss=7f289&oh=00_Af7TQFG5ngXstzcmTgOvyPr-nx_qDys6mQ-rNNgfZvDdEA&oe=6A051E4B">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        :root { --primary: #800000; --bg: #f4f4f4; }
        
        body { background: var(--bg); padding-bottom: 50px; }

        .header {
            background: var(--primary);
            color: white;
            padding: 60px 20px;
            text-align: center;
            clip-path: polygon(0 0, 100% 0, 100% 85%, 0 100%);
        }

        .header h1 { font-family: 'Oswald', sans-serif; font-size: 2.5rem; text-transform: uppercase; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }

        /* Gallery Grid */
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }

        .gallery-item {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            height: 250px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            background: #ddd; /* Photo load hone se pehle grey dikhega */
        }

        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .overlay {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 20px;
            font-size: 14px;
            opacity: 0;
            transition: 0.3s;
        }

        .gallery-item:hover .overlay { opacity: 1; }

        /* Modern Back Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            margin-top: 40px;
            padding: 12px 25px;
            border: 2px solid var(--primary);
            color: var(--primary);
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }

        .back-btn:hover { background: var(--primary); color: white; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Our School Gallery</h1>
        <p>Capturing Moments of Learning & Joy</p>
    </div>

    <div class="container">
        <div class="gallery-grid">
            <div class="gallery-item">
                <img src="school7.jpg" alt="School">
                <div class="overlay">Main School Campus</div>
            </div>

            <div class="gallery-item">
                <img src="school2.jpg" alt="Classroom">
                <div class="overlay">Modern Classrooms</div>
            </div>

            <div class="gallery-item">
                <img src="school4.jpg" alt="Sports">
                <div class="overlay">Sports & Activities</div>
            </div>

            <div class="gallery-item">
                <img src="school5.jpg" alt="Library">
                <div class="overlay">Library Room</div>
            </div>

            <div class="gallery-item">
                <img src="school3.jpg" alt="Event">
                <div class="overlay">Annual Function</div>
            </div>

            <div class="gallery-item">
                <img src="school6.jpg" alt="Lab">
                <div class="overlay">Science Laboratory</div>
            </div>
        </div>

        <center>
            <a href="index.html" class="back-btn">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
                Return to Home
            </a>
        </center>
    </div>

</body>
</html>
